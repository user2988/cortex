name: Database Migration

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run (migrate or cleanup)'
        required: true
        default: 'cleanup'
        type: choice
        options:
          - cleanup
          - migrate

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Run script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python database/${{ github.event.inputs.script }}.py
