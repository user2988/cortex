name: Cortex Morning Briefing
on:
  schedule:
    - cron: '30 11 * * *'  # 7:30am EDT (UTC-4, Mar–Nov)
    # - cron: '30 12 * * *'  # 7:30am EST (UTC-5, Nov–Mar)
  workflow_dispatch:
    inputs:
      last_session:
        description: 'What did you train yesterday? (Legs / Back / Chest / Arms / Rest)'
        required: false
        default: ''
      session_notes:
        description: 'Any notes? (optional)'
        required: false
        default: ''
jobs:
  run-Cortex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests anthropic pinecone numpy python-dotenv
      - name: Restore Fitbit tokens
        run: echo '${{ secrets.FITBIT_TOKENS }}' > fitbit_tokens.json
      - name: Run Cortex pipeline
        env:
          FITBIT_CLIENT_ID:     ${{ secrets.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
          PINECONE_API_KEY:     ${{ secrets.PINECONE_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:      ${{ secrets.EMAIL_RECIPIENT }}
          LAST_SESSION:         ${{ github.event.inputs.last_session }}
          SESSION_NOTES:        ${{ github.event.inputs.session_notes }}
        run: python cortex.py
      - name: Save updated Fitbit tokens
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          NEW_TOKENS=$(cat fitbit_tokens.json)
          gh secret set FITBIT_TOKENS --body "$NEW_TOKENS" --repo ${{ github.repository }}
