name: Cortex Daily Pipeline
on:
  schedule:
    - cron: '0 15 * * *'   # 11:00am EDT — first attempt
    - cron: '0 18 * * *'   # 02:00pm EDT — catches late wakers / delayed syncs
    - cron: '0 21 * * *'   # 05:00pm EDT — final catch-up
    # Winter (EST, UTC-5): shift each cron hour +1
  workflow_dispatch:
jobs:
  run-Cortex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests psycopg2-binary
      - name: Restore Fitbit tokens
        run: echo '${{ secrets.FITBIT_TOKENS }}' > fitbit_tokens.json
      - name: Run Cortex pipeline
        env:
          FITBIT_CLIENT_ID:     ${{ secrets.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          CRONOMETER_EMAIL:     ${{ secrets.CRONOMETER_EMAIL }}
          CRONOMETER_PASSWORD:  ${{ secrets.CRONOMETER_PASSWORD }}
        run: python cortex.py
      - name: Save updated Fitbit tokens
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          NEW_TOKENS=$(cat fitbit_tokens.json)
          gh secret set FITBIT_TOKENS --body "$NEW_TOKENS" --repo ${{ github.repository }}
