name: Fitbit Backfill (14 days)

on:
  schedule:
    - cron: '0 3 * * *'   # 11:00pm EDT (UTC-4, Mar–Nov)
    # - cron: '0 4 * * *' # 11:00pm EST (UTC-5, Nov–Mar)
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests psycopg2-binary

      - name: Restore Fitbit tokens
        run: echo '${{ secrets.FITBIT_TOKENS }}' > fitbit_tokens.json

      - name: Run backfill
        env:
          FITBIT_CLIENT_ID:     ${{ secrets.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
        run: python backfill.py

      - name: Save updated Fitbit tokens
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          NEW_TOKENS=$(cat fitbit_tokens.json)
          gh secret set FITBIT_TOKENS --body "$NEW_TOKENS" --repo ${{ github.repository }}
